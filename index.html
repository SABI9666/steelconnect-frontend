<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SteelConnect - Professional Steel & Rebar Design Marketplace</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* --- GLOBAL STYLES & VARIABLES --- */
        :root {
            --primary-color: #005a9c; /* Professional Blue */
            --primary-hover: #004a80;
            --primary-light: #e6f0f7;
            --text-dark: #1f2937;
            --text-gray: #6b7280;
            --bg-white: #ffffff;
            --bg-light: #f9fafb;
            --border-color: #e5e7eb;
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }
        html { scroll-behavior: smooth; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: var(--bg-light); color: var(--text-dark); line-height: 1.6; }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* --- HEADER / NAVBAR --- */
        .header { background: rgba(255,255,255,0.8); border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .header-container { max-width: 1400px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 64px; }
        .logo { display: flex; align-items: center; gap: 8px; font-size: 24px; font-weight: 700; color: var(--text-dark); text-decoration: none; cursor: pointer; }
        .logo-icon { width: 32px; height: 32px; background: var(--primary-color); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; }
        .nav-menu { flex-grow: 1; display: flex; justify-content: center; gap: 4px; }
        .nav-link { padding: 8px 16px; border-radius: 6px; color: var(--text-gray); font-weight: 500; font-size: 14px; cursor: pointer; background: none; border: none; text-decoration: none; }
        .nav-link:hover { color: var(--primary-color); }
        .auth-buttons { display: flex; gap: 12px; }
        .user-profile-menu { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 40px; height: 40px; background-color: var(--primary-color); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; }
        .user-name { font-weight: 600; }
        .user-role { font-size: 14px; color: var(--text-gray); text-transform: capitalize; }

        /* --- BUTTONS --- */
        .btn { padding: 10px 20px; border-radius: 8px; font-weight: 600; font-size: 15px; cursor: pointer; border: 1px solid transparent; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s; }
        .btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
        .btn-outline { background: var(--bg-white); color: var(--primary-color); border-color: var(--primary-color); }
        .btn-outline:hover { background: var(--primary-color); color: white; }
        .btn-primary { background: var(--primary-color); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }

        /* --- LANDING PAGE --- */
        .hero { color: white; padding: 120px 24px; text-align: center; background: linear-gradient(135deg, #1e3a8a, #005a9c); }
        .hero-content { max-width: 900px; margin: 0 auto; }
        .hero-text h1 { font-size: 52px; font-weight: 800; line-height: 1.1; margin-bottom: 24px; }
        .hero-text p { font-size: 18px; opacity: 0.9; max-width: 700px; margin: 0 auto 32px; }
        .landing-section { background: var(--bg-white); padding: 100px 24px; }
        .landing-container { max-width: 1200px; margin: 0 auto; }
        .section-title { font-size: 36px; font-weight: 800; text-align: center; margin-bottom: 50px; color: var(--text-dark); }
        .features-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
        .feature-card { text-align: center; padding: 40px 30px; background: var(--bg-white); border-radius: 16px; transition: all 0.4s; border: 1px solid var(--border-color); box-shadow: var(--shadow-md); cursor: pointer; position: relative; overflow: hidden; }
        .feature-card:hover { transform: translateY(-8px); box-shadow: var(--shadow-lg); }
        .feature-icon { font-size: 36px; color: var(--primary-color); margin-bottom: 20px; }
        .feature-card h3 { font-size: 22px; margin-bottom: 15px; color: var(--text-dark); }
        .feature-expanded-content { max-height: 0; overflow: hidden; transition: max-height 0.5s ease, padding 0.5s ease, opacity 0.5s ease; opacity: 0; }
        .feature-card.expanded .feature-expanded-content { max-height: 600px; opacity: 1; padding-top: 20px; border-top: 1px solid var(--border-color); margin-top: 20px; }
        .expand-indicator { position: absolute; bottom: 20px; right: 20px; width: 30px; height: 30px; background: var(--primary-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--primary-color); font-size: 14px; transition: all 0.3s ease; }
        .feature-card.expanded .expand-indicator { transform: rotate(180deg); }
        .professional-image { width: 100%; height: auto; border-radius: 12px; margin-bottom: 20px; }
        .showcase-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .showcase-card { background: var(--bg-white); border-radius: 16px; border: 1px solid var(--border-color); overflow: hidden; transition: all 0.3s ease; }
        .showcase-card:hover { transform: translateY(-8px); box-shadow: var(--shadow-lg); }
        .showcase-image { width: 100%; height: 200px; object-fit: cover; }
        .showcase-content { padding: 24px; }
        .showcase-content h3 { font-size: 20px; margin-bottom: 10px; }
        .showcase-content p { color: var(--text-gray); }

        /* --- MAIN APP VIEW --- */
        .main-layout { display: flex; }
        .sidebar { width: 260px; background: var(--bg-white); border-right: 1px solid var(--border-color); padding: 24px; height: calc(100vh - 64px); position: sticky; top: 64px; display: flex; flex-direction: column; }
        .main-content { flex-grow: 1; padding: 40px; }
        .main-container { max-width: 1200px; margin: 0 auto; }
        .sidebar-user-profile { text-align: center; margin-bottom: 30px; }
        .sidebar-avatar { width: 80px; height: 80px; background: var(--primary-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 32px; margin: 0 auto 10px; }
        .sidebar-user-profile h3 { font-size: 18px; font-weight: 600; }
        .sidebar-user-profile p { color: var(--text-gray); font-size: 14px; text-transform: capitalize; }
        .sidebar-nav { flex-grow: 1; display: flex; flex-direction: column; gap: 8px; }
        .sidebar-nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 8px; color: var(--text-gray); font-weight: 500; font-size: 15px; cursor: pointer; text-decoration: none; transition: all 0.2s; }
        .sidebar-nav-link:hover { background: var(--primary-light); color: var(--primary-color); }
        .sidebar-nav-link.active { background: var(--primary-color); color: white; }
        .logout-btn-container { margin-top: auto; padding-top: 20px; }

        /* --- MODALS, ALERTS, & OTHER COMPONENTS --- */
        .section-header { margin-bottom: 32px; padding-bottom: 16px; border-bottom: 1px solid var(--border-color); }
        .section-header h2 { font-size: 28px; font-weight: 700; color: var(--text-dark); }
        .form-grid { display: grid; gap: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-label { font-weight: 500; font-size: 14px; }
        .form-input, .form-select, .form-textarea { padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 15px; width: 100%; }
        .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(0, 90, 156, 0.1); }
        .jobs-grid { display: grid; gap: 24px; }
        .job-card { background: var(--bg-white); border: 1px solid var(--border-color); border-radius: 12px; padding: 24px; transition: all 0.3s; }
        .job-card:hover { box-shadow: var(--shadow-lg); }
        .job-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 16px; }
        .job-header h3 { font-size: 20px; font-weight: 600; }
        .job-budget { background: var(--primary-light); color: var(--primary-color); padding: 6px 12px; border-radius: 20px; font-size: 14px; font-weight: 600; white-space: nowrap; }
        .job-actions { margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border-color); text-align: right; }
        #alerts-container { position: fixed; top: 80px; right: 24px; z-index: 2000; display: flex; flex-direction: column; gap: 12px; }
        .alert { padding: 16px 20px; border-radius: 8px; font-weight: 500; display: flex; align-items: center; gap: 12px; min-width: 300px; box-shadow: var(--shadow-lg); animation: slideIn 0.5s forwards; border-left: 5px solid; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }
        .alert-success { background: #d1fae5; color: #065f46; border-color: #10b981; }
        .alert-error { background: #fee2e2; color: #991b1b; border-color: #ef4444; }
        .alert-info { background: #e0f2fe; color: #075985; border-color: #0ea5e9; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.7); display: flex; align-items: center; justify-content: center; z-index: 1100; backdrop-filter: blur(5px); }
        .modal-content { background: var(--bg-white); padding: 40px; border-radius: 16px; max-width: 450px; width: 90%; position: relative; box-shadow: var(--shadow-lg); }
        .modal-close-button { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-gray); }
        .modal-switch { text-align: center; margin-top: 16px; font-size: 14px; }
        .modal-switch a { color: var(--primary-color); cursor: pointer; font-weight: 500; }
        .empty-state { text-align: center; padding: 40px; background-color: var(--bg-light); border-radius: 12px; }
        .empty-state h3 { margin-bottom: 8px; color: var(--text-dark); }
        .empty-state p { color: var(--text-gray); }
        .quote-card { border: 1px solid var(--border-color); padding: 16px; border-radius: 8px; margin-bottom: 12px; }

        /* --- AESTHETIC MESSAGING STYLES --- */
        .chat-modal-content {
            display: flex;
            flex-direction: column;
            height: 70vh;
            max-height: 600px;
        }
        .chat-header {
            padding-bottom: 16px;
            margin-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }
        .message-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message-wrapper {
            display: flex;
            max-width: 75%;
        }
        .message-wrapper.me {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .message-wrapper.them {
            align-self: flex-start;
        }
        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: var(--text-gray);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            margin: 0 8px;
            flex-shrink: 0;
        }
        .message-bubble {
            padding: 10px 15px;
            border-radius: 18px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .message-bubble.me {
            background-color: var(--primary-color);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message-bubble.them {
            background-color: var(--bg-light);
            border: 1px solid var(--border-color);
            color: var(--text-dark);
            border-bottom-left-radius: 4px;
        }
        .message-meta {
            font-size: 12px;
            color: var(--text-gray);
            margin-top: 4px;
        }
        .message-wrapper.me .message-meta {
            text-align: right;
        }
        .message-form {
            display: flex;
            gap: 10px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }
        .message-form input {
            flex-grow: 1;
        }
        .quote-actions {
            margin-top: 10px;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        /* --- RESPONSIVE DESIGN --- */
        @media (max-width: 992px) { 
            .header-container { padding: 0 16px; }
        }
        @media (max-width: 768px) { 
            .nav-menu { display: none; } 
            .hero-text h1 { font-size: 36px; }
        }
    </style>
</head>
<body>
    <div id="alerts-container"></div>
    <div id="modal-container"></div>

    <header class="header">
        </header>

    <div id="landing-page-content">
        </div>

    <div id="app-content" class="main-layout" style="display: none;">
        </div>

    <script>
        document.addEventListener('DOMContentLoaded', initializeApp);

        // --- CONSTANTS & STATE ---
        const BACKEND_URL = 'https://steelconnect-backend.onrender.com/api'; // Correct API path
        const appState = {
            currentUser: null,
            jwtToken: null,
            jobs: [],
            myQuotes: [],
            participants: {}
        };

        // --- INACTIVITY LOGOUT LOGIC ---
        let inactivityTimer;

        function logoutDueToInactivity() {
            logout('inactive');
        }

        function resetInactivityTimer() {
            clearTimeout(inactivityTimer);
            inactivityTimer = setTimeout(logoutDueToInactivity, 5 * 60 * 1000); // 5 minutes
        }

        function setupInactivityListeners() {
            const events = ['mousemove', 'mousedown', 'keypress', 'scroll', 'touchstart'];
            events.forEach(event => window.addEventListener(event, resetInactivityTimer, true));
        }

        function clearInactivityListeners() {
            const events = ['mousemove', 'mousedown', 'keypress', 'scroll', 'touchstart'];
            events.forEach(event => window.removeEventListener(event, resetInactivityTimer, true));
        }

        const getAttachmentUrl = (path) => {
            if (!path) return '#';
            if (path.startsWith('http')) {
                return path;
            }
            // For any relative paths, use the base URL without /api
            return `${BACKEND_URL.replace('/api', '')}${path}`;
        };


        function initializeApp() {
            // --- Event Listeners Setup ---
            // Note: The original HTML file has elements with these IDs.
            // We assume they will be rendered before these listeners are needed.
            const setupLandingPageListeners = () => {
                const signinBtn = document.getElementById('signin-btn');
                const joinBtn = document.getElementById('join-btn');
                const getStartedBtn = document.getElementById('get-started-btn');
                if(signinBtn) signinBtn.addEventListener('click', () => showAuthModal('login'));
                if(joinBtn) joinBtn.addEventListener('click', () => showAuthModal('register'));
                if(getStartedBtn) getStartedBtn.addEventListener('click', () => showAuthModal('register'));
            };
            
            // Initial setup for the logo which is always in the header
            document.querySelector('.logo').addEventListener('click', (e) => {
                e.preventDefault();
                if (appState.currentUser) renderAppSection('jobs');
                else showLandingPageView();
            });

            // --- Session Check ---
            const token = localStorage.getItem('jwtToken');
            const user = localStorage.getItem('currentUser');
            if (token && user) {
                try {
                    appState.jwtToken = token;
                    appState.currentUser = JSON.parse(user);
                    showAppView();
                } catch (error) {
                    logout();
                }
            } else {
                showLandingPageView();
                // We need to ensure landing page content is rendered before setting up listeners
                // This can be done inside showLandingPageView or by calling a setup function after rendering
            }
        }

        async function apiCall(endpoint, method, body = null, successMessage = null, callback = null) {
            try {
                const options = {
                    method,
                    headers: {}
                };
                if (appState.jwtToken) {
                    options.headers['Authorization'] = `Bearer ${appState.jwtToken}`;
                }
                if (body) {
                    if (body instanceof FormData) {
                        options.body = body;
                    } else {
                        options.headers['Content-Type'] = 'application/json';
                        options.body = JSON.stringify(body);
                    }
                }
                const response = await fetch(BACKEND_URL + endpoint, options);
                const responseData = await response.json();

                if (!response.ok) {
                    throw new Error(responseData.message || 'An API error occurred.');
                }

                if (successMessage) showAlert(successMessage, 'success');
                if (callback) callback(responseData);

            } catch (error) {
                showAlert(error.message, 'error');
            }
        }

        // --- User Authentication Functions ---
        async function handleRegister(event) {
            event.preventDefault();
            const form = event.target;
            const userData = { name: form.regName.value, email: form.regEmail.value, password: form.regPassword.value, type: form.regRole.value };
            apiCall('/auth/register', 'POST', userData, 'Registration successful! Please sign in.', () => renderAuthForm('login'));
        }

        async function handleLogin(event) {
            event.preventDefault();
            const form = event.target;
            const authData = { email: form.loginEmail.value, password: form.loginPassword.value };
            apiCall('/auth/login', 'POST', authData, null, (data) => {
                showAlert('Login successful!', 'success');
                appState.currentUser = data.user;
                appState.jwtToken = data.token;
                localStorage.setItem('currentUser', JSON.stringify(data.user));
                localStorage.setItem('jwtToken', data.token);
                closeModal();
                showAppView();
            });
        }

        function logout(reason = null) {
            clearInactivityListeners();
            clearTimeout(inactivityTimer);
            localStorage.clear();
            appState.currentUser = null;
            appState.jwtToken = null;
            showLandingPageView();
            const message = reason === 'inactive' ? 'You have been logged out due to inactivity.' : 'You have been logged out.';
            showAlert(message, 'info');
        }

        // --- Core App Logic Functions (Jobs & Quotes) ---
        async function fetchAndRenderJobs() {
            const jobsListContainer = document.getElementById('jobs-list');
            if(!jobsListContainer) return;
            jobsListContainer.innerHTML = '<p>Loading projects...</p>';
            const user = appState.currentUser;
            const endpoint = user.type === 'designer' ? '/jobs' : `/jobs/user/${user.id}`;

            apiCall(endpoint, 'GET', null, null, (response) => {
                const jobs = response.data || [];
                appState.jobs = jobs;

                if (jobs.length === 0) {
                    jobsListContainer.innerHTML = user.type === 'designer'
                        ? `<div class="empty-state"><h3>No Projects Available</h3><p>Check back for new opportunities.</p></div>`
                        : `<div class="empty-state"><h3>You haven't posted any projects.</h3><p>Click 'Post a Job' to get started.</p></div>`;
                    return;
                }

                jobsListContainer.innerHTML = jobs.map(job => {
                    const actions = user.type === 'designer'
                        ? `<button class="btn btn-primary" onclick="showQuoteModal('${job.id}')">Submit Quote</button>`
                        : `<button class="btn btn-outline" onclick="viewQuotes('${job.id}')">View Quotes (${job.quotesCount || 0})</button>
                           <button class="btn btn-danger" onclick="deleteJob('${job.id}')">Delete Job</button>`;

                    const attachmentLink = job.attachment
                        ? `<p style="margin-top: 12px;"><strong>Attachment:</strong> <a href="${getAttachmentUrl(job.attachment)}" target="_blank" rel="noopener noreferrer">View File</a></p>`
                        : '';

                    return `
                        <div class="job-card">
                            <div class="job-header">
                                <div><h3>${job.title}</h3><p class="text-gray" style="font-size: 14px;">Posted by: ${job.posterName || 'N/A'}</p></div>
                                <div class="job-budget">${job.budget}</div>
                            </div>
                            <p>${job.description}</p>
                            ${job.skills?.length > 0 ? `<p style="margin-top: 12px;"><strong>Skills:</strong> ${job.skills.join(', ')}</p>` : ''}
                            ${attachmentLink}
                            <div class="job-actions">${actions}</div>
                        </div>`;
                }).join('');
            });
        }

        async function fetchAndRenderMyQuotes() {
            const listContainer = document.getElementById('my-quotes-list');
            if(!listContainer) return;
            listContainer.innerHTML = '<p>Loading your quotes...</p>';

            apiCall(`/quotes/user/${appState.currentUser.id}`, 'GET', null, null, (response) => {
                const quotes = response.data || [];

                if (quotes.length === 0) {
                    listContainer.innerHTML = `<div class="empty-state"><p>You have not submitted any quotes.</p></div>`;
                    return;
                }

                listContainer.innerHTML = quotes.map(quote => {
                    const attachmentLink = quote.attachments && quote.attachments[0]
                        ? `<p><strong>Attachment:</strong> <a href="${getAttachmentUrl(quote.attachments[0])}" target="_blank">View File</a></p>` : '';
                    
                    const messageButton = quote.status === 'approved' 
                        ? `<button class="btn btn-primary" onclick="openConversation('${quote.jobId}', '${quote.contractorId}', 'Client')">Message Client</button>` : '';

                    return `
                        <div class="job-card quote-status-${quote.status}">
                            <div class="job-header">
                                <div><h3>Quote for: ${quote.jobTitle}</h3><p>Amount: $${quote.quoteAmount}</p></div>
                                <div class="job-budget">Status: ${quote.status}</div>
                            </div>
                            <p>${quote.description}</p>
                            ${attachmentLink}
                            <div class="job-actions">${messageButton}</div>
                        </div>`;
                }).join('');
            });
        }
        
        // --- UI Rendering Functions (Templates) ---
        // (These functions are necessary for the app to work but were not included in the provided files.
        // They are created here based on the function calls seen in the logic.)

        function renderHeader() {
            const header = document.querySelector('.header');
            const user = appState.currentUser;
            const buttonsHTML = user 
                ? `
                    <div class="user-profile-menu">
                        <div class="avatar">${user.name.charAt(0)}</div>
                        <div>
                            <div class="user-name">${user.name}</div>
                            <div class="user-role">${user.type}</div>
                        </div>
                    </div>
                `
                : `
                    <div class="auth-buttons">
                        <button id="signin-btn" class="btn btn-outline">Sign In</button>
                        <button id="join-btn" class="btn btn-primary">Join Now</button>
                    </div>
                `;

            header.innerHTML = `
                <div class="header-container">
                    <a href="#" class="logo">
                        <div class="logo-icon">S</div> SteelConnect
                    </a>
                    <nav class="nav-menu">
                        <a href="#features" class="nav-link">Features</a>
                        <a href="#showcase" class="nav-link">Showcase</a>
                    </nav>
                    ${buttonsHTML}
                </div>
            `;
            // Re-attach listeners for dynamically created elements
            if (!user) {
                document.getElementById('signin-btn').addEventListener('click', () => showAuthModal('login'));
                document.getElementById('join-btn').addEventListener('click', () => showAuthModal('register'));
            }
        }
        
        function showLandingPageView() {
            renderHeader();
            const landingPage = document.getElementById('landing-page-content');
            const appContent = document.getElementById('app-content');
            landingPage.style.display = 'block';
            appContent.style.display = 'none';

            landingPage.innerHTML = `
                <section class="hero">
                    <div class="hero-content">
                        <div class="hero-text">
                            <h1>The Premier Marketplace for Steel & Rebar Design</h1>
                            <p>Connecting innovative structural engineers and designers with construction firms looking for top-tier talent.</p>
                            <button id="get-started-btn" class="btn btn-primary">Get Started Today</button>
                        </div>
                    </div>
                </section>
                <section id="features" class="landing-section">
                    <div class="landing-container">
                        <h2 class="section-title">Why SteelConnect?</h2>
                        <div class="features-grid">
                            </div>
                    </div>
                </section>
                <section id="showcase" class="landing-section" style="background: var(--bg-light);">
                    <div class="landing-container">
                        <h2 class="section-title">Featured Projects</h2>
                        <div class="showcase-grid">
                            </div>
                    </div>
                </section>
            `;
            // Re-attach listener for the get-started button
             document.getElementById('get-started-btn').addEventListener('click', () => showAuthModal('register'));
        }

        function showAppView() {
            renderHeader();
            const landingPage = document.getElementById('landing-page-content');
            const appContent = document.getElementById('app-content');
            landingPage.style.display = 'none';
            appContent.style.display = 'flex';
            setupInactivityListeners();
            resetInactivityTimer();
            renderAppSection('jobs'); // Default to jobs view
        }
        
        function renderAppSection(sectionName) {
            const appContent = document.getElementById('app-content');
            const user = appState.currentUser;
            const sidebarHTML = `
                <aside class="sidebar">
                    <div class="sidebar-user-profile">
                        <div class="sidebar-avatar">${user.name.charAt(0)}</div>
                        <h3>${user.name}</h3>
                        <p>${user.type}</p>
                    </div>
                    <nav class="sidebar-nav">
                        <a href="#" class="sidebar-nav-link ${sectionName === 'jobs' ? 'active' : ''}" data-section="jobs">
                            <i class="fa-solid fa-briefcase"></i> Browse Projects
                        </a>
                        ${user.type === 'designer' ? `
                        <a href="#" class="sidebar-nav-link ${sectionName === 'my-quotes' ? 'active' : ''}" data-section="my-quotes">
                            <i class="fa-solid fa-file-invoice-dollar"></i> My Quotes
                        </a>
                        ` : `
                        <a href="#" class="sidebar-nav-link" onclick="showPostJobModal()">
                            <i class="fa-solid fa-plus-circle"></i> Post a Job
                        </a>`}
                    </nav>
                    <div class="logout-btn-container">
                        <button id="logout-button" class="btn btn-outline" style="width: 100%;">
                            <i class="fa-solid fa-right-from-bracket"></i> Logout
                        </button>
                    </div>
                </aside>
            `;

            let mainContentHTML = '';
            if (sectionName === 'jobs') {
                mainContentHTML = `
                    <div class="section-header"><h2>Available Projects</h2></div>
                    <div id="jobs-list" class="jobs-grid"></div>
                `;
            } else if (sectionName === 'my-quotes') {
                mainContentHTML = `
                    <div class="section-header"><h2>My Submitted Quotes</h2></div>
                    <div id="my-quotes-list" class="jobs-grid"></div>
                `;
            }
            
            appContent.innerHTML = `
                ${sidebarHTML}
                <main class="main-content">
                    <div class="main-container">
                        ${mainContentHTML}
                    </div>
                </main>
            `;
            
            // Fetch content for the rendered section
            if (sectionName === 'jobs') fetchAndRenderJobs();
            if (sectionName === 'my-quotes') fetchAndRenderMyQuotes();

            // Add event listeners for new elements
            document.getElementById('logout-button').addEventListener('click', (e) => { e.preventDefault(); logout(); });
            document.querySelectorAll('.sidebar-nav-link').forEach(link => {
                if(link.dataset.section) {
                    link.addEventListener('click', (e) => {
                        e.preventDefault();
                        renderAppSection(link.dataset.section);
                    });
                }
            });
        }
        
        function showAuthModal(type) {
            const modalContainer = document.getElementById('modal-container');
            modalContainer.innerHTML = `
                <div class="modal-overlay">
                    <div class="modal-content" id="auth-modal-content">
                        </div>
                </div>
            `;
            renderAuthForm(type);
        }
        
        function renderAuthForm(type) {
            const modalContent = document.getElementById('auth-modal-content');
            if(!modalContent) return;
            const isLogin = type === 'login';
            modalContent.innerHTML = `
                <button class="modal-close-button" onclick="closeModal()">×</button>
                <h2>${isLogin ? 'Sign In' : 'Create Account'}</h2>
                <form id="${isLogin ? 'login-form' : 'register-form'}" class="form-grid" style="margin-top: 20px;">
                    ${isLogin ? `
                        <div class="form-group">
                            <label for="loginEmail" class="form-label">Email</label>
                            <input type="email" id="loginEmail" name="loginEmail" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label for="loginPassword" class="form-label">Password</label>
                            <input type="password" id="loginPassword" name="loginPassword" class="form-input" required>
                        </div>
                    ` : `
                        <div class="form-group">
                            <label for="regName" class="form-label">Full Name</label>
                            <input type="text" id="regName" name="regName" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label for="regEmail" class="form-label">Email</label>
                            <input type="email" id="regEmail" name="regEmail" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label for="regPassword" class="form-label">Password</label>
                            <input type="password" id="regPassword" name="regPassword" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label for="regRole" class="form-label">I am a...</label>
                            <select id="regRole" name="regRole" class="form-select" required>
                                <option value="designer">Designer / Engineer</option>
                                <option value="contractor">Contractor / Firm</option>
                            </select>
                        </div>
                    `}
                    <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">${isLogin ? 'Sign In' : 'Register'}</button>
                </form>
                <div class="modal-switch">
                    ${isLogin ? `Don't have an account? <a onclick="renderAuthForm('register')">Register</a>` : `Already have an account? <a onclick="renderAuthForm('login')">Sign In</a>`}
                </div>
            `;
            
            if(isLogin) {
                document.getElementById('login-form').addEventListener('submit', handleLogin);
            } else {
                document.getElementById('register-form').addEventListener('submit', handleRegister);
            }
        }
        
        function closeModal() {
            const modalContainer = document.getElementById('modal-container');
            modalContainer.innerHTML = '';
        }

        function showAlert(message, type = 'info') {
            const container = document.getElementById('alerts-container');
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;
            container.appendChild(alertDiv);
            setTimeout(() => {
                alertDiv.remove();
            }, 5000);
        }
        
        // Dummy functions for actions until they are fully implemented
        function showPostJobModal() { showAlert('Post Job modal not implemented yet.', 'info'); }
        function showQuoteModal(jobId) { showAlert(`Submit Quote for job ${jobId} not implemented yet.`, 'info'); }
        function viewQuotes(jobId) { showAlert(`View Quotes for job ${jobId} not implemented yet.`, 'info'); }
        function deleteJob(jobId) { showAlert(`Delete Job ${jobId} not implemented yet.`, 'info'); }
        function openConversation(jobId, contractorId, clientName) { showAlert('Messaging not implemented yet.', 'info');}

    </script>
</body>
</html>
