<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SteelConnect - Professional Steel & Rebar Design Marketplace</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-color: #14a800; --primary-hover: #0f7a00; --primary-light: #f0fdf4;
            --text-dark: #1f2937; --text-gray: #6b7280; --bg-white: #ffffff; --bg-light: #f3f4f6;
            --border-color: #e5e7eb; --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --gradient-hero: linear-gradient(135deg, rgba(31, 41, 55, 0.9) 0%, rgba(17, 24, 39, 0.9) 100%);
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: var(--bg-white); color: var(--text-dark); line-height: 1.6; }
        .header { background: var(--bg-white); border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; }
        .header-container { max-width: 1200px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 64px; }
        .logo { display: flex; align-items: center; gap: 8px; font-size: 24px; font-weight: 700; color: var(--primary-color); text-decoration: none; }
        .logo-icon { width: 32px; height: 32px; background: var(--primary-color); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: white; }
        .nav-menu { display: flex; gap: 4px; }
        .nav-link { padding: 8px 16px; border-radius: 6px; color: var(--text-gray); font-weight: 500; font-size: 14px; cursor: pointer; background: none; border: none; }
        .nav-link:hover { color: var(--text-dark); background-color: var(--bg-light); }
        .nav-link.active { color: var(--primary-color); background-color: var(--primary-light); }
        .auth-buttons { display: flex; gap: 12px; }
        .btn { padding: 8px 16px; border-radius: 6px; font-weight: 500; font-size: 14px; cursor: pointer; border: 1px solid transparent; display: inline-flex; align-items: center; gap: 6px; }
        .btn-outline { background: var(--bg-white); color: var(--text-dark); border-color: var(--border-color); }
        .btn-primary { background: var(--primary-color); color: white; }
        .btn-secondary { background: var(--bg-light); color: var(--text-dark); }
        .btn-danger { background: #ef4444; color: white; }
        .hero { background: var(--gradient-hero); color: white; padding: 80px 0; text-align: left; }
        .hero-content { max-width: 1200px; margin: 0 auto; padding: 0 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }
        .hero-text h1 { font-size: 48px; font-weight: 700; margin-bottom: 20px; line-height: 1.2; }
        .hero-text p { font-size: 18px; opacity: 0.9; }
        .hero-visual { display: flex; align-items: center; justify-content: center; }
        .hero-image { width: 100%; max-width: 450px; height: auto; border-radius: 16px; object-fit: cover; border: 2px solid rgba(255, 255, 255, 0.1); box-shadow: var(--shadow-md); }
        .main-container { max-width: 1200px; margin: 0 auto; padding: 40px 24px; }
        .content-section { display: none; }
        .content-section.active { display: block; }
        .section-header { margin-bottom: 32px; padding-bottom: 16px; border-bottom: 1px solid var(--border-color); }
        .section-title { font-size: 24px; font-weight: 600; }
        .form-grid { display: grid; gap: 24px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-label { font-weight: 500; font-size: 14px; }
        .form-input, .form-select, .form-textarea { padding: 12px 16px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 14px; }
        .form-textarea { min-height: 120px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .jobs-grid, .quotes-grid { display: grid; gap: 20px; }
        .job-card, .quote-card { background: var(--bg-white); border: 1px solid var(--border-color); border-radius: 12px; padding: 24px; }
        .job-card:hover { border-color: var(--primary-color); box-shadow: var(--shadow-md); }
        .job-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
        .job-header h3 { font-size: 18px; font-weight: 600; }
        .job-budget { background: var(--primary-color); color: white; padding: 6px 12px; border-radius: 20px; font-size: 14px; }
        .job-description { color: var(--text-gray); margin-bottom: 16px; }
        .job-attachment a { color: var(--primary-color); text-decoration: none; font-weight: 500; }
        .job-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border-color); }
        .quote-header h4 { font-size: 16px; }
        .quote-amount { font-size: 18px; font-weight: 700; color: var(--primary-color); }
        .quote-status { padding: 4px 12px; border-radius: 12px; font-size: 12px; text-transform: uppercase; }
        .quote-status.pending { background: #fef3c7; color: #92400e; } .quote-status.approved { background: #d1fae5; color: #065f46; } .quote-status.rejected { background: #fee2e2; color: #991b1b; }
        .user-profile { display: flex; align-items: center; gap: 16px; padding: 16px 20px; background: var(--bg-light); border-radius: 12px; margin-bottom: 24px; }
        .user-avatar { width: 48px; height: 48px; background: var(--primary-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 18px; }
        .user-info h3 { font-size: 16px; } .user-info p { color: var(--text-gray); font-size: 14px; }
        .alert { padding: 16px 20px; border-radius: 8px; margin-bottom: 24px; font-weight: 500; }
        .alert-success { background: #f0fdf4; color: #166534; } .alert-error { background: #fef2f2; color: #991b1b; } .alert-info { background: #eff6ff; color: #1e40af; }
        .empty-state { text-align: center; padding: 60px 32px; color: var(--text-gray); } .empty-state h3 { font-size: 20px; margin-bottom: 8px; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); display: flex; align-items: center; justify-content: center; z-index: 200; }
        .modal-content { background: var(--bg-white); padding: 32px; border-radius: 12px; max-width: 600px; width: 90%; }
        .modal-close-button { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-gray); }
        .spinner-container { display: flex; justify-content: center; padding: 60px; }
        .spinner { width: 32px; height: 32px; border: 3px solid var(--border-color); border-radius: 50%; border-top-color: var(--primary-color); animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 768px) { .hero-content { grid-template-columns: 1fr; text-align: center; } .hero-visual { display: none; } .nav-menu { display: none; } .form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-container">
            <a href="#" class="logo" onclick="showSection('jobs'); return false;">
                <div class="logo-icon">SC</div> SteelConnect
            </a>
            <nav id="main-nav-menu" class="nav-menu"></nav>
            <div id="auth-buttons-container" class="auth-buttons"></div>
        </div>
    </header>
    <section class="hero" id="hero-section">
        <div class="hero-content">
            <div class="hero-text">
                <h1>Connecting clients to steel professionals who deliver</h1>
                <p>Find top steel designers and contractors for your projects. Post jobs, submit quotes, and build your network.</p>
            </div>
            <div class="hero-visual">
                <img src="https://images.unsplash.com/photo-1518257654620-ef442358c45d?q=80&w=2070&auto=format&fit=crop" alt="Modern steel structure" class="hero-image">
            </div>
        </div>
    </section>
    <main>
        <div id="main-container" class="main-container">
            <div id="user-profile" class="user-profile" style="display: none;">
                <div class="user-avatar" id="userAvatar"></div>
                <div class="user-info">
                    <h3 id="userName"></h3>
                    <p id="userType"></p>
                </div>
                <div style="margin-left: auto;">
                    <button id="logout-button" class="btn btn-secondary"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
                </div>
            </div>
            <div id="alerts"></div>
            <section id="jobs-section" class="content-section">
                <div class="section-header"><h2 class="section-title">Available Jobs</h2></div>
                <div id="jobs-list" class="jobs-grid"></div>
            </section>
            <section id="post-job-section" class="content-section">
                <div class="section-header"><h2 class="section-title">Post a New Job</h2></div>
                <form id="post-job-form" class="form-grid">
                    <div class="form-row"><div class="form-group"><label class="form-label">Job Title</label><input type="text" class="form-input" id="jobTitle" required></div><div class="form-group"><label class="form-label">Budget</label><input type="text" class="form-input" id="jobBudget" required></div></div>
                    <div class="form-row"><div class="form-group"><label class="form-label">Skills</label><input type="text" class="form-input" id="jobSkills"></div><div class="form-group"><label class="form-label">Deadline</label><input type="date" class="form-input" id="jobDeadline" required></div></div>
                    <div class="form-group"><label class="form-label">Description</label><textarea class="form-textarea" id="jobDescription" required></textarea></div>
                    <div class="form-group"><label class="form-label">Attach File</label><input type="file" class="form-input" id="jobAttachmentFile"></div>
                    <div class="form-group"><label class="form-label">Attach Link</label><input type="url" class="form-input" id="jobAttachmentLink" placeholder="https://..."></div>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-plus"></i> Post Job</button>
                </form>
            </section>
            <section id="quotes-section" class="content-section">
                <div class="section-header"><h2 class="section-title">My Submitted Quotes</h2></div>
                <div id="my-quotes-list" class="quotes-grid"></div>
            </section>
            <section id="login-section" class="content-section">
                <div class="section-header"><h2 class="section-title">Sign In</h2></div>
                <form id="login-form" class="form-grid" style="max-width: 400px; margin: 0 auto;"><div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" id="loginEmail" required></div><div class="form-group"><label class="form-label">Password</label><input type="password" class="form-input" id="loginPassword" required></div><button type="submit" class="btn btn-primary">Sign In</button></form>
            </section>
            <section id="register-section" class="content-section">
                <div class="section-header"><h2 class="section-title">Join SteelConnect</h2></div>
                <form id="register-form" class="form-grid" style="max-width: 600px; margin: 0 auto;"><div class="form-row"><div class="form-group"><label class="form-label">Full Name</label><input type="text" class="form-input" id="regName" required></div><div class="form-group"><label class="form-label">Username</label><input type="text" class="form-input" id="regUsername" required></div></div><div class="form-row"><div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" id="regEmail" required></div><div class="form-group"><label class="form-label">Password</label><input type="password" class="form-input" id="regPassword" required></div></div><div class="form-group"><label class="form-label">I am a...</label><select class="form-select" id="regRole" required><option value="">Select role</option><option value="contractor">Contractor</option><option value="designer">Designer</option></select></div><button type="submit" class="btn btn-primary">Create Account</button></form>
            </section>
        </div>
    </main>
    <div id="modal-container"></div>
    <script src="script.js"></script>
</body>
</html>
