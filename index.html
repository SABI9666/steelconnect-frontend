<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SteelConnect - Professional Steel & Rebar Design Marketplace</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* --- General Resets & Variables --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #1e3a8a;
            --primary-hover: #1e40af;
            --primary-light: #dbeafe;
            --secondary-color: #0ea5e9;
            --text-dark: #1f2937;
            --text-gray: #6b7280;
            --bg-white: #ffffff;
            --bg-light: #f8fafc;
            --border-color: #e5e7eb;
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --gradient-primary: linear-gradient(135deg, #1e3a8a, #0ea5e9);
            --gradient-secondary: linear-gradient(135deg, #0f172a, #1e3a8a);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
        }

        /* --- Header & Navigation --- */
        .header {
            background: rgba(255,255,255,0.95);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 24px;
            font-weight: 700;
            color: var(--text-dark);
            text-decoration: none;
            cursor: pointer;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--gradient-primary);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }

        .nav-menu {
            display: flex;
            gap: 4px;
        }

        .nav-link {
            padding: 8px 16px;
            border-radius: 6px;
            color: var(--text-gray);
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            background: none;
            border: none;
            transition: all 0.2s;
        }

        .nav-link:hover {
            background: var(--primary-light);
            color: var(--primary-color);
        }

        .auth-buttons {
            display: flex;
            gap: 12px;
        }

        /* --- Buttons --- */
        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            border: 1px solid transparent;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
            text-decoration: none;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn-outline {
            background: var(--bg-white);
            color: var(--primary-color);
            border-color: var(--primary-color);
        }
        
        .btn-outline:hover {
            background: var(--primary-color);
            color: white;
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: white;
            border: none;
        }
        
        .btn-primary:hover {
            background: var(--gradient-secondary);
            box-shadow: var(--shadow-md);
        }

        /* --- Landing Page: Hero Section --- */
        .hero {
            position: relative;
            color: white;
            padding: 140px 0;
            text-align: center;
            overflow: hidden;
            background: var(--gradient-secondary);
        }

        .hero-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            opacity: 0.15;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(circle at 30% 20%, rgba(14, 165, 233, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(30, 58, 138, 0.4) 0%, transparent 50%),
                var(--gradient-secondary);
            z-index: 2;
        }

        .hero-content {
            position: relative;
            z-index: 3;
            max-width: 900px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .hero-content h1 {
            font-size: 56px;
            font-weight: 800;
            margin-bottom: 24px;
            line-height: 1.1;
            text-shadow: 0 4px 8px rgba(0,0,0,0.3);
            background: linear-gradient(135deg, #ffffff, #e0f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* --- App Layout --- */
        .main-layout {
            display: flex;
            min-height: calc(100vh - 64px);
        }

        .sidebar {
            width: 260px;
            background: var(--bg-white);
            border-right: 1px solid var(--border-color);
            padding: 24px;
            height: calc(100vh - 64px);
            position: sticky;
            top: 64px;
        }

        .main-content {
            flex-grow: 1;
            padding: 40px;
            background: var(--bg-light);
        }

        .main-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .content-section {
            display: none;
            background: var(--bg-white);
            border-radius: 12px;
            padding: 32px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-md);
        }
        
        .content-section.active {
            display: block;
        }

        .sidebar-user-profile {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--bg-light);
            border-radius: 12px;
        }

        .sidebar-avatar {
            width: 80px;
            height: 80px;
            background: var(--gradient-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 32px;
            margin: 0 auto 10px;
            border: 3px solid var(--primary-light);
        }

        .sidebar-user-profile h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .sidebar-user-profile p {
            color: var(--text-gray);
            font-size: 14px;
            text-transform: capitalize;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-grow: 1;
        }

        .sidebar-nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 8px;
            color: var(--text-gray);
            font-weight: 500;
            font-size: 15px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }

        .sidebar-nav-link:hover {
            background: var(--primary-light);
            color: var(--primary-color);
        }

        .sidebar-nav-link.active {
            background: var(--gradient-primary);
            color: white;
            box-shadow: var(--shadow-md);
        }

        .sidebar-nav-link i {
            width: 20px;
            text-align: center;
        }

        .logout-btn-container {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        /* --- Forms & Cards --- */
        .section-header {
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .section-header h2 {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-dark);
        }
        
        .form-grid {
            display: grid;
            gap: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-weight: 500;
            font-size: 14px;
            color: var(--text-dark);
        }
        
        .form-input, .form-select, .form-textarea {
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
            width: 100%;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1);
        }

        .form-textarea {
            min-height: 120px;
            resize: vertical;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        
        .jobs-grid, .quotes-grid {
            display: grid;
            gap: 24px;
        }

        .job-card {
            background: var(--bg-white);
            border: 1px solid var(--border-color);
            border-left: 5px solid var(--secondary-color);
            border-radius: 12px;
            padding: 24px;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
        }

        .job-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
            border-left-color: var(--primary-color);
        }
        
        .job-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
            gap: 16px;
        }

        .job-header h3 {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-dark);
            line-height: 1.3;
        }

        .job-budget {
            background: var(--primary-light);
            color: var(--primary-color);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
        }

        .job-description {
            color: var(--text-gray);
            margin-bottom: 20px;
            flex-grow: 1;
        }

        .job-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            font-size: 14px;
            color: var(--text-gray);
            margin-bottom: 20px;
        }
        
        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .meta-item i {
            color: var(--primary-color);
        }

        .job-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }
        
        /* --- Alerts & Modals --- */
        #alerts-container {
            position: fixed;
            top: 80px;
            right: 24px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .alert {
            padding: 16px 20px;
            border-radius: 8px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 300px;
            box-shadow: var(--shadow-lg);
            opacity: 0;
            transform: translateX(100%);
            animation: slideIn 0.5s forwards;
        }
        
        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .alert-success { background: #d1fae5; color: #065f46; border-left: 5px solid #10b981; }
        .alert-error { background: #fee2e2; color: #991b1b; border-left: 5px solid #ef4444; }
        .alert-info { background: #dbeafe; color: #1e40af; border-left: 5px solid #3b82f6; }
        
        .empty-state {
            text-align: center;
            padding: 60px 32px;
            color: var(--text-gray);
            background: var(--bg-light);
            border-radius: 12px;
            border: 2px dashed var(--border-color);
        }
        
        /* --- Responsive Design --- */
        @media (max-width: 992px) {
            .sidebar { display: none; }
            .form-row { grid-template-columns: 1fr; }
        }
        
        @media (max-width: 768px) {
            .nav-menu { display: none; }
            .hero-content h1 { font-size: 40px; }
            .main-content { padding: 24px; }
        }

    </style>
</head>
<body>
    <header class="header">
        <div class="header-container">
            <a class="logo" onclick="goToHome()">
                <div class="logo-icon">SC</div>
                SteelConnect
            </a>
            <nav id="main-nav-menu" class="nav-menu">
                <button class="nav-link">Features</button>
                <button class="nav-link">Projects</button>
                <button class="nav-link">About</button>
            </nav>
            <div id="auth-buttons-container" class="auth-buttons">
                <button class="btn btn-outline" onclick="showSection('login')">Sign In</button>
                <button class="btn btn-primary" onclick="showSection('register')">Join Now</button>
            </div>
        </div>
    </header>

    <div id="alerts-container"></div>

    <div id="landing-page-content">
        <section class="hero" id="hero-section">
            <div class="hero-content">
                <h1>Connecting Clients to Steel & Construction Professionals Who Deliver</h1>
            </div>
        </section>
        <main class="main-content">
            <div id="main-container" class="main-container">
                </div>
        </main>
    </div>

    <div id="app-layout" class="main-layout" style="display: none;">
        <aside class="sidebar" id="app-sidebar">
            <div style="display: flex; flex-direction: column; height: 100%;">
                <div class="sidebar-user-profile">
                    <div class="sidebar-avatar" id="userAvatar"></div>
                    <h3 id="userName"></h3>
                    <p id="userType"></p>
                </div>
                <nav class="sidebar-nav" id="sidebar-nav-menu"></nav>
                <div class="logout-btn-container">
                    <a href="#" id="logout-button" class="sidebar-nav-link">
                        <i class="fas fa-sign-out-alt"></i>
                        <span>Logout</span>
                    </a>
                </div>
            </div>
        </aside>
        <main class="main-content">
            <div id="app-main-container" class="main-container">
                 </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', initializeApp);

        const BACKEND_URL = 'https://steelconnect-backend.onrender.com';
        const appState = {
            currentUser: null,
            jwtToken: null,
            activeSection: 'jobs'
        };
        
        // --- CORE APP INITIALIZATION ---
        function initializeApp() {
            // Attach permanent event listeners
            document.getElementById('logout-button').addEventListener('click', (e) => {
                e.preventDefault();
                logout();
            });
            
            // Check for existing session
            const token = localStorage.getItem('jwtToken');
            const user = localStorage.getItem('currentUser');
            
            if (token && user) {
                try {
                    appState.jwtToken = token;
                    appState.currentUser = JSON.parse(user);
                    updateUIForLoggedInUser();
                } catch (error) {
                    logout(); // Clear invalid data
                }
            } else {
                updateUIForLoggedOutUser();
            }
        }

        // --- UI MANAGEMENT ---
        function updateUIForLoggedInUser() {
            document.getElementById('landing-page-content').style.display = 'none';
            document.getElementById('app-layout').style.display = 'flex';
            
            const user = appState.currentUser;
            document.getElementById('userName').textContent = user.fullName;
            document.getElementById('userType').textContent = user.role;
            document.getElementById('userAvatar').textContent = user.fullName.charAt(0).toUpperCase();

            buildSidebarNav();
            showSection(appState.activeSection);
        }

        function updateUIForLoggedOutUser() {
            document.getElementById('landing-page-content').style.display = 'block';
            document.getElementById('app-layout').style.display = 'none';
            showSection('login');
        }

        function showSection(sectionId) {
            appState.activeSection = sectionId;
            const container = appState.currentUser ? document.getElementById('app-main-container') : document.getElementById('main-container');
            
            // Clear previous content
            container.innerHTML = '';
            
            // Deactivate all sidebar links
            document.querySelectorAll('.sidebar-nav-link').forEach(link => link.classList.remove('active'));

            // Activate current sidebar link
            const activeLink = document.querySelector(`.sidebar-nav-link[onclick*="'${sectionId}'"]`);
            if (activeLink) activeLink.classList.add('active');

            // Inject the correct HTML template
            let sectionHtml = '';
            switch (sectionId) {
                case 'login':
                    sectionHtml = getLoginTemplate();
                    break;
                case 'register':
                    sectionHtml = getRegisterTemplate();
                    break;
                case 'jobs':
                    sectionHtml = getJobsTemplate();
                    fetchJobs();
                    break;
                case 'post-job':
                    sectionHtml = getPostJobTemplate();
                    break;
                case 'quotes':
                    sectionHtml = getQuotesTemplate();
                    fetchMyQuotes();
                    break;
            }
            container.innerHTML = sectionHtml;

            // Re-attach event listeners for the new content
            attachEventListeners(sectionId);
        }

        function attachEventListeners(sectionId) {
            switch (sectionId) {
                case 'login':
                    document.getElementById('login-form').addEventListener('submit', handleLogin);
                    break;
                case 'register':
                    document.getElementById('register-form').addEventListener('submit', handleRegister);
                    break;
                case 'post-job':
                     document.getElementById('post-job-form').addEventListener('submit', handlePostJob);
                    break;
            }
        }
        
        function goToHome() {
            if (appState.currentUser) {
                showSection('jobs');
            } else {
                showSection('login');
            }
        }
        
        function buildSidebarNav() {
            const navContainer = document.getElementById('sidebar-nav-menu');
            const role = appState.currentUser.role;
            let navLinks = '';

            if (role === 'designer') {
                navLinks = `
                    <a href="#" class="sidebar-nav-link" onclick="showSection('jobs')"><i class="fas fa-briefcase"></i> <span>Find Jobs</span></a>
                    <a href="#" class="sidebar-nav-link" onclick="showSection('quotes')"><i class="fas fa-file-invoice-dollar"></i> <span>My Quotes</span></a>
                `;
            } else { // contractor
                navLinks = `
                    <a href="#" class="sidebar-nav-link" onclick="showSection('jobs')"><i class="fas fa-tasks"></i> <span>My Projects</span></a>
                    <a href="#" class="sidebar-nav-link" onclick="showSection('post-job')"><i class="fas fa-plus-circle"></i> <span>Post a Job</span></a>
                `;
            }
            navContainer.innerHTML = navLinks;
        }


        // --- API & DATA HANDLING ---
        async function apiCall(endpoint, method, body = null) {
            const url = `${BACKEND_URL}${endpoint}`;
            const options = {
                method,
                headers: { 'Content-Type': 'application/json' }
            };

            if (appState.jwtToken) {
                options.headers['Authorization'] = `Bearer ${appState.jwtToken}`;
            }

            if (body) {
                options.body = JSON.stringify(body);
            }

            try {
                const response = await fetch(url, options);
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'An unknown error occurred.');
                }
                return data;
            } catch (error) {
                showAlert(error.message, 'error');
                throw error;
            }
        }
        
        async function handleRegister(event) {
            event.preventDefault();
            const form = event.target;
            const userData = {
                fullName: form.regName.value,
                username: form.regUsername.value,
                email: form.regEmail.value,
                password: form.regPassword.value,
                role: form.regRole.value
            };
            try {
                await apiCall('/auth/register', 'POST', userData);
                showAlert('Registration successful! Please sign in.', 'success');
                showSection('login');
            } catch (error) {
                // Error is already shown by apiCall
            }
        }

        async function handleLogin(event) {
            event.preventDefault();
            const form = event.target;
            const credentials = {
                email: form.loginEmail.value,
                password: form.loginPassword.value
            };
            try {
                const data = await apiCall('/auth/login', 'POST', credentials);
                appState.currentUser = data.user;
                appState.jwtToken = data.token;
                localStorage.setItem('currentUser', JSON.stringify(data.user));
                localStorage.setItem('jwtToken', data.token);
                showAlert('Login successful!', 'success');
                updateUIForLoggedInUser();
            } catch (error) {
                // Error is already shown by apiCall
            }
        }
        
        function logout() {
            appState.currentUser = null;
            appState.jwtToken = null;
            localStorage.removeItem('currentUser');
            localStorage.removeItem('jwtToken');
            updateUIForLoggedOutUser();
        }

        async function fetchJobs() {
            try {
                const jobs = await apiCall('/jobs', 'GET');
                renderJobs(jobs);
            } catch (error) {
                document.getElementById('jobs-list').innerHTML = `<p>Could not load jobs.</p>`;
            }
        }
        
        async function handlePostJob(event) {
            event.preventDefault();
            const form = event.target;
            const jobData = {
                title: form.jobTitle.value,
                description: form.jobDescription.value,
                budget: form.jobBudget.value,
                skills: form.jobSkills.value.split(',').map(s => s.trim()),
                deadline: form.jobDeadline.value,
            };
            try {
                await apiCall('/jobs', 'POST', jobData);
                showAlert('Job posted successfully!', 'success');
                showSection('jobs');
            } catch(error) {
                // Error handled in apiCall
            }
        }

        async function fetchMyQuotes() {
            const listEl = document.getElementById('quotes-list');
            listEl.innerHTML = `<div class="empty-state"><h3>Feature Coming Soon</h3><p>The ability to view and manage your quotes is under development.</p></div>`;
        }

        // --- RENDERING ---
        function renderJobs(jobs) {
            const listEl = document.getElementById('jobs-list');
            if (!jobs || jobs.length === 0) {
                listEl.innerHTML = `<div class="empty-state"><h3>No jobs found.</h3><p>There are currently no open projects. Check back later or post a new job.</p></div>`;
                return;
            }
            
            listEl.innerHTML = jobs.map(job => `
                <div class="job-card">
                    <div class="job-header">
                        <h3>${job.title}</h3>
                        <div class="job-budget">${job.budget}</div>
                    </div>
                    <p class="job-description">${job.description}</p>
                    <div class="job-meta">
                        <div class="meta-item"><i class="fas fa-cogs"></i> <span>${job.skills.join(', ')}</span></div>
                        <div class="meta-item"><i class="fas fa-calendar-alt"></i> <span>Deadline: ${new Date(job.deadline).toLocaleDateString()}</span></div>
                    </div>
                    ${appState.currentUser.role === 'designer' ? 
                    `<div class="job-actions">
                        <button class="btn btn-primary"><i class="fas fa-file-alt"></i> Submit Quote</button>
                    </div>` : ''
                    }
                </div>
            `).join('');
        }
        
        function showAlert(message, type = 'info') {
            const container = document.getElementById('alerts-container');
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> <span>${message}</span>`;
            
            container.appendChild(alertDiv);
            
            setTimeout(() => {
                alertDiv.style.animation = 'slideOut 0.5s forwards';
                setTimeout(() => alertDiv.remove(), 500);
            }, 4000);
        }
        
        // --- HTML TEMPLATES ---
        function getLoginTemplate() {
            return `
            <section id="login-section" class="content-section active">
                <div class="section-header" style="text-align: center;">
                    <h2>Sign In to SteelConnect</h2>
