<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SteelConnect - Premium Engineering Hub</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="header-container">
            <a href="#" class="logo">
                <i class="fas fa-drafting-compass"></i>
                <span>SteelConnect</span>
            </a>
            
            <nav class="nav-menu" id="main-nav-menu">
                <a href="#how-it-works" class="nav-link">How It Works</a>
                <a href="#why-steelconnect" class="nav-link">Why Choose Us</a>
                <a href="#showcase" class="nav-link">Showcase</a>
            </nav>
            
            <div class="auth-buttons" id="auth-buttons-container">
                <button class="btn btn-secondary" id="signin-btn">
                    <i class="fas fa-sign-in-alt"></i>
                    Sign In
                </button>
                <button class="btn btn-primary" id="join-btn">
                    <i class="fas fa-rocket"></i>
                    Get Started
                </button>
            </div>
            
            <div class="user-info" id="user-info" style="display: none;">
                <div class="user-avatar" id="userAvatar">A</div>
                <div class="user-details">
                    <div class="user-name" id="userName"></div>
                    <div class="user-type" id="userType"></div>
                </div>
                <button class="btn btn-danger btn-sm" id="logout-button" style="padding: 10px 15px;">
                    <i class="fas fa-sign-out-alt"></i>
                    Logout
                </button>
            </div>
        </div>
    </header>

    <div id="landing-page-content">
        </div>

    <div id="app-content" style="display: none;">
        <div class="main-container">
            <aside class="sidebar">
                <div class="sidebar-user">
                    <div class="sidebar-avatar" id="sidebarUserAvatar"></div>
                    <div class="sidebar-user-info">
                        <h3 id="sidebarUserName"></h3>
                        <p id="sidebarUserType"></p>
                    </div>
                </div>
                <nav class="sidebar-nav" id="sidebar-nav-menu">
                    </nav>
            </aside>
            <main class="content-area">
                <div id="app-container">
                    </div>
            </main>
        </div>
    </div>

    <div id="modal-container"></div>
    <div id="notification-container" class="notification-container"></div>

    <script src="script.js"></script>
</body>
</html>
