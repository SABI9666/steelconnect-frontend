<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SteelConnect - Professional Marketplace</title>
    <style>
        /* Your aesthetic CSS goes here. It has not been changed. */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary-color: #005a9c; --text-dark: #1f2937; --text-gray: #6b7280; --bg-white: #ffffff; --bg-light: #f9fafb; --border-color: #e5e7eb; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: var(--bg-light); color: var(--text-dark); }
        .header { background: var(--bg-white); border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 1000; }
        .header-container { max-width: 1400px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 64px; }
        .logo { font-size: 24px; font-weight: 700; color: var(--text-dark); text-decoration: none; cursor: pointer; }
        .nav-menu { display: flex; gap: 4px; }
        .nav-link { padding: 8px 16px; border-radius: 6px; color: var(--text-gray); font-weight: 500; cursor: pointer; background: none; border: none; }
        .btn { padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; border: 1px solid transparent; }
        .btn-outline { background: var(--bg-white); color: var(--primary-color); border-color: var(--primary-color); }
        .btn-primary { background: var(--primary-color); color: white; }
        .main-container { max-width: 1200px; margin: 0 auto; padding: 40px 24px; }
        .form-grid { display: grid; gap: 20px; max-width: 500px; margin: auto; background: white; padding: 40px; border-radius: 12px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-label { font-weight: 500; }
        .form-input, .form-select, .form-textarea { padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 15px; width: 100%; }
        .jobs-grid { display: grid; gap: 24px; }
        .job-card { background: var(--bg-white); border: 1px solid var(--border-color); border-radius: 12px; padding: 24px; }
        .job-header { display: flex; justify-content: space-between; }
        .job-budget { color: var(--primary-color); font-weight: 600; }
        .job-attachment a { color: var(--primary-color); text-decoration: none; font-weight: 500; }
        .job-actions { margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border-color); text-align: right; }
        #alerts-container { position: fixed; top: 80px; right: 24px; z-index: 2000; }
        .alert { padding: 16px; border-radius: 8px; margin-bottom: 10px; }
        .alert-success { background: #d1fae5; color: #065f46; }
        .alert-error { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-container">
            <a href="#" class="logo">SteelConnect</a>
            <nav id="main-nav-menu" class="nav-menu"></nav>
            <div id="auth-buttons-container" style="display: flex; gap: 12px;">
                <button id="signin-btn" class="btn btn-outline">Sign In</button>
                <button id="join-btn" class="btn btn-primary">Join Now</button>
            </div>
            <div id="user-profile" style="display: none; align-items: center; gap: 15px;">
                <span id="userName" style="font-weight: 600;"></span>
                <button id="logout-button" class="btn btn-outline">Logout</button>
            </div>
        </div>
    </header>
    <div id="alerts-container"></div>
    <main>
        <div id="jobs-section" class="main-container" style="display: none;"><div id="jobs-list" class="jobs-grid"></div></div>
        <div id="post-job-section" class="main-container" style="display: none;"><form id="post-job-form" class="form-grid"></form></div>
        <div id="login-section" class="main-container" style="display: none;"><form id="login-form" class="form-grid"></form></div>
        <div id="register-section" class="main-container" style="display: none;"><form id="register-form" class="form-grid"></form></div>
    </main>
    <script src="script.js" defer></script>
</body>
</html>
